services:
  backend:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend
      - ./frontend:/app/frontend
    environment:
      - PYTHONUNBUFFERED=1
    depends_on:
      - vllm
    
  vllm:
    image: vllm/vllm-openai:latest
    ports:
      - "8001:8001"
    environment:
      - VLLM_MODEL_ID=mistralai/Voxtral-Mini-4B-Realtime-2602
      - VLLM_PORT=8001
      - VLLM_HOST=0.0.0.0
      - VLLM_API_KEY=token-abc123
      - VLLM_ENABLE_REALTIME_MODE=True
    command: [
      "--model", "mistralai/Voxtral-Mini-4B-Realtime-2602",
      "--host", "0.0.0.0",
      "--port", "8001",
      "--api-key", "token-abc123",
      "--enforce-eager",
      "--trust-remote-code"
      ]
    volumes:
      - vllm_cache:/root/.cache/vllm
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

volumes:
  vllm_cache: