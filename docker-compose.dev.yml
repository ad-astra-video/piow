services:
  caddy:
    image: caddy:latest
    container_name: live-translation-app-caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile.template:/etc/caddy/Caddyfile.template
      - ./start-caddy.sh:/start-caddy.sh
      - ./frontend:/frontend
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - HOST_IP=${HOST_IP}
      - HTTPS_EMAIL=${HTTPS_EMAIL}
    command: ["/start-caddy.sh"]
    depends_on:
      - vllm
  backend:
    build:
      context: .
      args:
        - VITE_SUPABASE_URL=${VITE_SUPABASE_URL}
        - VITE_SUPABASE_PUBLISHABLE_KEY=${VITE_SUPABASE_PUBLISHABLE_KEY}
        - VITE_STRIPE_PUBLIC_KEY=${VITE_STRIPE_PUBLIC_KEY:-}
        - VITE_FACILITATOR_URL=${VITE_FACILITATOR_URL:-https://x402.org/facilitator}
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
      - "40000-40100:40000-40100/udp"
    sysctls:
      - net.ipv4.ip_local_port_range=40000 40100
    cap_add:
      - SYS_ADMIN
    volumes:
      - ./backend:/app/backend
      - ./frontend:/app/frontend
      - ./models:/models
    environment:
      - DEBUG_AUDIO_WAV=1
      - PYTHONUNBUFFERED=1
      # Host IP for SDP munging - CRITICAL for WebRTC in Docker
      # Replaces container's internal IP with host IP in SDP responses
      - HOST_IP=${HOST_IP:-127.0.0.1}
      # Public domain for Stripe and other public-facing URLs
      - DOMAIN=${DOMAIN:-}
      # ICE servers for WebRTC NAT traversal
      # Default: Google STUN server
      # For production, add TURN servers
      - ICE_SERVERS=${ICE_SERVERS:-stun:stun.l.google.com:19302}
      # TURN server configuration (optional, for complex NAT scenarios)
      - TURN_SERVER=${TURN_SERVER:-}
      - TURN_USERNAME=${TURN_USERNAME:-}
      - TURN_PASSWORD=${TURN_PASSWORD:-}
    depends_on:
      vllm:
        condition: service_healthy
    restart: unless-stopped
  vllm:
    build:
      context: ./worker
      dockerfile: Dockerfile.vllm
    ports:
      - "6000:6000"
    ipc: "host"
    command:
      - "--model"
      - "mistralai/Voxtral-Mini-4B-Realtime-2602"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "6000"
      - "--gpu-memory-utilization"
      - "0.90"
      - "--max-model-len"
      - "45500"
      - "--kv-cache-dtype"
      - "fp8"
      - "--attention-backend"
      - "TRITON_ATTN"
      - "--compilation_config"
      - '{"cudagraph_mode": "PIECEWISE"}'
      - "--trust-remote-code"
    volumes:
      - vllm_models:/root/.cache
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
        limits:
          cpus: "4.0"
          memory: 8G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6000/health"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
    restart: unless-stopped
  coturn:
    image: coturn/coturn:latest
    container_name: live-translation-app-coturn
    ports:
      - "3478:3478"
      - "3478:3478/udp"
      - "5349:5349"
      - "5349:5349/udp"
      - "40000-40100:40000-40100/udp"
      - "40000-40100:40000-40100/tcp"
    environment:
      - TURN_SERVER_REALM=live-translation-app
      - TURN_SERVER_USERNAME=${TURN_USERNAME}
      - TURN_SERVER_PASSWORD=${TURN_PASSWORD}
      - EXTERNAL_IP=${HOST_IP:-127.0.0.1}
    command:
      - "-n"
      - "--log-file=stdout"
      - "--realm=live-translation-app"
      - "--listening-port=3478"
      - "--tls-listening-port=5349"
      - "--min-port=40000"
      - "--max-port=40100"
      - "--user=turn_user:turn_password_123"
      - "--external-ip=${HOST_IP:-127.0.0.1}"
      - "--listening-ip=0.0.0.0"
      - "--no-cli"
      - "--no-tls"
      - "--no-dtls"
      - "--fingerprint"
      - "--no-loopback-peers"
      - "--no-multicast-peers"
      - "--verbose"
    restart: unless-stopped
    networks:
      - default
  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    ports:
      - "8001:8001"
      - "40000-40100:40000-40100/udp"
    sysctls:
      - net.ipv4.ip_local_port_range=40000 40100
    cap_add:
      - SYS_ADMIN
    volumes:
      - ./worker:/app/worker
      - ./models:/models
    environment:
      - DEBUG_AUDIO_WAV=1
      - PYTHONUNBUFFERED=1
      - HOST_IP=${HOST_IP:-127.0.0.1}
      - ICE_SERVERS=${ICE_SERVERS:-stun:stun.l.google.com:19302}
      - TURN_SERVER=${TURN_SERVER:-}
      - TURN_USERNAME=${TURN_USERNAME:-}
      - TURN_PASSWORD=${TURN_PASSWORD:-}
      - VLLM_WS_URL=ws://vllm:6000/v1/realtime
    depends_on:
      vllm:
        condition: service_healthy
    restart: unless-stopped
volumes:
  vllm_models:
  caddy_data:
  caddy_config:
  worker_models: