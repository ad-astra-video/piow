services:
  worker:
    build:
      context: .
    ports:
      - "9935:9935"
    env_file:
      - .env
    environment:
      - DEBUG_AUDIO_WAV=1
      - PYTHONUNBUFFERED=1
      - HOST_IP=${HOST_IP:-127.0.0.1}
      - WORKER_PORT=9935
      - ICE_SERVERS=${ICE_SERVERS:-stun:stun.l.google.com:19302}
      - TURN_SERVER=${TURN_SERVER:-}
      - TURN_USERNAME=${TURN_USERNAME:-}
      - TURN_PASSWORD=${TURN_PASSWORD:-}
      - VLLM_WS_URL=ws://vllm:6000/v1/realtime
      - GEMMA_VLLM_BASE_URL=http://gemma-vllm:${GEMMA_VLLM_PORT:-6100}
    depends_on:
      vllm:
        condition: service_healthy
      gemma-vllm:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["${WORKER_GPUS}"]
              capabilities: [gpu]
  gemma-vllm:
    build:
      context: .
      dockerfile: Dockerfile.vllm
    ports:
      - "6100:6100"
    ipc: "host"
    command:
      - "--model"
      - "${GEMMA_VLLM_MODEL}"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "${GEMMA_VLLM_PORT}"
      - "--gpu-memory-utilization"
      - "${GEMMA_VLLM_GPU_MEMORY_UTILIZATION}"
      - "--max-model-len"
      - "${GEMMA_VLLM_MAX_MODEL_LEN}"
      - "--limit-mm-per-prompt"
      - '{"image": 30, "audio": 5}'
      - "--trust-remote-code"
    volumes:
      - vllm_models:/root/.cache
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["${GEMMA_VLLM_GPUS}"]
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${GEMMA_VLLM_PORT}/health"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
    restart: unless-stopped
  vllm:
    build:
      context: .
      dockerfile: Dockerfile.vllm
    ports:
      - "6000:6000"
    ipc: "host"
    command:
      - "--model"
      - "mistralai/Voxtral-Mini-4B-Realtime-2602"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "6000"
      - "--gpu-memory-utilization"
      - "${REALTIME_GPU_MEMORY_UTILIZATION}"
      - "--max-model-len"
      - "16384"
      # Voxtral realtime requires mistral tokenizer mode
      - "--tokenizer-mode"
      - "mistral"
      - "--enforce-eager"
      - "--trust-remote-code"
    volumes:
      - vllm_models:/root/.cache
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["${REALTIME_GPUS}"]
              capabilities: [gpu]
        limits:
          cpus: "4.0"
          memory: 8G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6000/health"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
    restart: unless-stopped

volumes:
  vllm_models:
